<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100" role="img" aria-labelledby="title desc">
  <title id="title">RhetoriQ system architecture diagram</title>
  <desc id="desc">Architecture diagram showing frontend, FastAPI backend, investigation pipeline, storage, and external services.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#284b63"/>
    </marker>
    <marker id="arrow-soft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7b8fa1"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #12263a; }
      .subtitle { font: 500 16px Arial, Helvetica, sans-serif; fill: #4e6476; }
      .section { font: 700 18px Arial, Helvetica, sans-serif; fill: #12263a; }
      .label { font: 700 14px Arial, Helvetica, sans-serif; fill: #12263a; }
      .body { font: 500 13px Arial, Helvetica, sans-serif; fill: #334e68; }
      .small { font: 500 12px Arial, Helvetica, sans-serif; fill: #52667a; }
      .pill { font: 700 12px Arial, Helvetica, sans-serif; fill: #12263a; }
      .box { fill: #ffffff; stroke: #d8e1e8; stroke-width: 2; rx: 18; }
      .frontend { fill: #eef7f4; stroke: #9ec5b8; }
      .backend { fill: #f6f0ff; stroke: #c9b7e8; }
      .pipeline { fill: #fff6eb; stroke: #efc48b; }
      .storage { fill: #eef4ff; stroke: #a8bddf; }
      .external { fill: #f9efe9; stroke: #ddbcaa; }
      .guardrail { fill: #12263a; }
      .guardrail-text { font: 600 14px Arial, Helvetica, sans-serif; fill: #f7fbff; }
      .line { stroke: #284b63; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .soft-line { stroke: #7b8fa1; stroke-width: 2.5; fill: none; marker-end: url(#arrow-soft); }
      .dash-line { stroke: #7b8fa1; stroke-width: 2.5; stroke-dasharray: 8 8; fill: none; marker-end: url(#arrow-soft); }
      .lane { fill: #f8fafc; stroke: #e1e8ef; stroke-width: 1.5; rx: 22; }
    </style>
  </defs>

  <rect x="0" y="0" width="1800" height="1100" fill="#fbfaf6"/>

  <text x="60" y="62" class="title">RhetoriQ System Architecture</text>
  <text x="60" y="92" class="subtitle">Source-grounded civic narrative investigation platform with a staged backend pipeline and inspectable evidence artifacts.</text>

  <rect x="60" y="130" width="300" height="820" class="box frontend"/>
  <text x="84" y="168" class="section">1. Frontend Experience</text>

  <rect x="84" y="200" width="252" height="90" class="box"/>
  <text x="104" y="226" class="label">User inputs</text>
  <text x="104" y="250" class="body">- Ask RhetoriQ natural-language query</text>
  <text x="104" y="272" class="body">- Click a Live Narrative Radar topic</text>

  <rect x="84" y="320" width="252" height="130" class="box"/>
  <text x="104" y="346" class="label">Landing / Dashboard</text>
  <text x="104" y="370" class="body">- live radar feed</text>
  <text x="104" y="392" class="body">- recent investigations</text>
  <text x="104" y="414" class="body">- trust strip and product framing</text>

  <rect x="84" y="490" width="252" height="210" class="box"/>
  <text x="104" y="516" class="label">Investigation Page</text>
  <text x="104" y="540" class="body">- workspace loader</text>
  <text x="104" y="562" class="body">- flowchart and timeline story view</text>
  <text x="104" y="584" class="body">- source diversity and evidence gaps</text>
  <text x="104" y="606" class="body">- claim ledger and receipts</text>
  <text x="104" y="628" class="body">- debate summary and final report</text>
  <text x="104" y="662" class="small">React + TypeScript + Vite</text>
  <text x="104" y="684" class="small">API client in frontend/src/lib/api.ts</text>

  <rect x="84" y="744" width="252" height="176" class="lane"/>
  <text x="104" y="772" class="pill">Frontend runtime notes</text>
  <text x="104" y="798" class="small">The UI is not a chat shell.</text>
  <text x="104" y="820" class="small">It renders investigation artifacts as a</text>
  <text x="104" y="842" class="small">narrative flowchart, evidence cards, and</text>
  <text x="104" y="864" class="small">claim-by-claim support state.</text>

  <rect x="400" y="130" width="320" height="820" class="box backend"/>
  <text x="424" y="168" class="section">2. FastAPI Backend</text>

  <rect x="424" y="200" width="272" height="120" class="box"/>
  <text x="444" y="226" class="label">API entrypoint</text>
  <text x="444" y="250" class="body">backend/main.py</text>
  <text x="444" y="272" class="body">Routers: health, ingest, narratives, trending</text>
  <text x="444" y="294" class="body">CORS enabled for frontend client</text>

  <rect x="424" y="350" width="272" height="170" class="box"/>
  <text x="444" y="376" class="label">Primary endpoints</text>
  <text x="444" y="400" class="body">GET /api/trending</text>
  <text x="444" y="422" class="body">POST /api/investigate</text>
  <text x="444" y="444" class="body">GET /api/investigations/{id}</text>
  <text x="444" y="466" class="body">POST /api/investigations/{id}/run</text>
  <text x="444" y="488" class="body">POST stage endpoints for retrieve,</text>
  <text x="444" y="510" class="body">timeline, diversity, family, receipts, report</text>

  <rect x="424" y="552" width="272" height="170" class="box"/>
  <text x="444" y="578" class="label">Backend responsibility</text>
  <text x="444" y="602" class="body">Persist the investigation workspace,</text>
  <text x="444" y="624" class="body">orchestrate stages, and return structured</text>
  <text x="444" y="646" class="body">artifacts instead of a single opaque answer.</text>

  <rect x="424" y="754" width="272" height="166" class="lane"/>
  <text x="444" y="782" class="pill">Runtime modes</text>
  <text x="444" y="808" class="small">Demo mode: seeded corpus + deterministic builders</text>
  <text x="444" y="830" class="small">Live mode: search + model-backed research loop</text>
  <text x="444" y="852" class="small">This keeps the hackathon demo reliable while</text>
  <text x="444" y="874" class="small">preserving a credible path to production.</text>

  <rect x="760" y="130" width="400" height="820" class="box pipeline"/>
  <text x="784" y="168" class="section">3. Investigation Pipeline</text>

  <rect x="786" y="196" width="348" height="96" class="box"/>
  <text x="806" y="222" class="label">Planner Agent</text>
  <text x="806" y="246" class="body">Turns query text into an InvestigationPlan:</text>
  <text x="806" y="268" class="body">topic, phrase, intent, retrieval lanes, risks.</text>

  <rect x="786" y="322" width="348" height="96" class="box"/>
  <text x="806" y="348" class="label">Retriever Agent</text>
  <text x="806" y="372" class="body">Collects documents, scores relevance, detects</text>
  <text x="806" y="394" class="body">duplicates, and builds evidence coverage summaries.</text>

  <rect x="786" y="448" width="348" height="196" class="box"/>
  <text x="806" y="474" class="label">Artifact builders</text>
  <text x="806" y="498" class="body">- source diversity</text>
  <text x="806" y="520" class="body">- timeline / first observed in dataset</text>
  <text x="806" y="542" class="body">- counter-narratives</text>
  <text x="806" y="564" class="body">- narrative family / phrase mutation</text>
  <text x="806" y="586" class="body">- analyst synthesis</text>
  <text x="806" y="608" class="body">- provenance trace</text>
  <text x="806" y="630" class="body">Each stage produces a persisted workspace artifact.</text>

  <rect x="786" y="674" width="348" height="124" class="box"/>
  <text x="806" y="700" class="label">Gap analysis + skeptic review</text>
  <text x="806" y="724" class="body">Checks weak evidence, missing coverage, and</text>
  <text x="806" y="746" class="body">whether follow-up retrieval passes are needed.</text>
  <text x="806" y="768" class="body">Up to 3 supervised research passes.</text>

  <rect x="786" y="828" width="348" height="92" class="box"/>
  <text x="806" y="854" class="label">Receipts, report, and debate</text>
  <text x="806" y="878" class="body">Claim counterpoints, receipts, final report,</text>
  <text x="806" y="900" class="body">agent debate summary, confidence dimensions.</text>

  <rect x="1200" y="130" width="250" height="820" class="box storage"/>
  <text x="1224" y="168" class="section">4. Storage Layers</text>

  <rect x="1224" y="210" width="202" height="166" class="box"/>
  <text x="1244" y="236" class="label">SQLite repository</text>
  <text x="1244" y="260" class="body">investigations.sqlite3</text>
  <text x="1244" y="284" class="body">Stores plans, documents, artifacts,</text>
  <text x="1244" y="306" class="body">receipts, debate, and final report.</text>

  <rect x="1224" y="414" width="202" height="166" class="box"/>
  <text x="1244" y="440" class="label">Redis cache + vectors</text>
  <text x="1244" y="464" class="body">Workspace cache, semantic reuse,</text>
  <text x="1244" y="486" class="body">document vectors, faster retrieval,</text>
  <text x="1244" y="508" class="body">narrative memory layer.</text>

  <rect x="1224" y="618" width="202" height="166" class="box"/>
  <text x="1244" y="644" class="label">Seeded demo corpus</text>
  <text x="1244" y="668" class="body">Prebuilt narrative examples, phrase</text>
  <text x="1244" y="690" class="body">mutation, receipts, and reports for</text>
  <text x="1244" y="712" class="body">reliable demo-mode investigations.</text>

  <rect x="1224" y="822" width="202" height="98" class="lane"/>
  <text x="1244" y="850" class="pill">Why this matters</text>
  <text x="1244" y="876" class="small">Persisted workspaces make the system</text>
  <text x="1244" y="898" class="small">inspectable and reloadable.</text>

  <rect x="1490" y="130" width="250" height="820" class="box external"/>
  <text x="1514" y="168" class="section">5. External Services</text>

  <rect x="1514" y="210" width="202" height="154" class="box"/>
  <text x="1534" y="236" class="label">News and search inputs</text>
  <text x="1534" y="260" class="body">GDELT</text>
  <text x="1534" y="282" class="body">Hacker News Algolia</text>
  <text x="1534" y="304" class="body">Search-provider path</text>
  <text x="1534" y="326" class="body">Tavily / SerpAPI</text>

  <rect x="1514" y="402" width="202" height="154" class="box"/>
  <text x="1534" y="428" class="label">Model providers</text>
  <text x="1534" y="452" class="body">Gemini</text>
  <text x="1534" y="474" class="body">Groq</text>
  <text x="1534" y="496" class="body">Ollama fallback path</text>
  <text x="1534" y="518" class="body">wrapped behind model_client</text>

  <rect x="1514" y="594" width="202" height="154" class="box"/>
  <text x="1534" y="620" class="label">Verification</text>
  <text x="1534" y="644" class="body">Browser verification service</text>
  <text x="1534" y="666" class="body">Confirms receipt pages and marks</text>
  <text x="1534" y="688" class="body">verification state on evidence.</text>

  <rect x="1514" y="786" width="202" height="134" class="lane"/>
  <text x="1534" y="814" class="pill">Integration posture</text>
  <text x="1534" y="840" class="small">Optional services enrich the pipeline.</text>
  <text x="1534" y="862" class="small">The core architecture still works in demo mode.</text>

  <path d="M 336 245 L 424 245" class="line"/>
  <path d="M 336 384 L 424 384" class="line"/>
  <path d="M 336 594 L 424 594" class="line"/>
  <path d="M 696 260 L 786 244" class="line"/>
  <path d="M 696 468 L 786 370" class="line"/>
  <path d="M 696 594 L 786 594" class="line"/>

  <path d="M 1134 244 L 1224 244" class="line"/>
  <path d="M 1134 370 L 1224 497" class="line"/>
  <path d="M 1134 546 L 1224 292" class="soft-line"/>
  <path d="M 1134 734 L 786 370" class="dash-line"/>
  <path d="M 1134 874 L 1224 292" class="line"/>
  <path d="M 1134 874 L 336 594" class="soft-line"/>

  <path d="M 1514 286 L 1134 370" class="line"/>
  <path d="M 1514 478 L 1134 244" class="line"/>
  <path d="M 1514 478 L 1134 734" class="soft-line"/>
  <path d="M 1514 670 L 1134 874" class="line"/>

  <path d="M 1426 497 L 1514 670" class="soft-line"/>
  <path d="M 1426 700 L 786 370" class="soft-line"/>

  <rect x="60" y="980" width="1680" height="76" rx="20" class="guardrail"/>
  <text x="88" y="1012" class="guardrail-text">Safety and trust guardrails:</text>
  <text x="292" y="1012" class="guardrail-text">first observed in our dataset</text>
  <text x="518" y="1012" class="guardrail-text">|</text>
  <text x="546" y="1012" class="guardrail-text">source diversity is context, not truth scoring</text>
  <text x="918" y="1012" class="guardrail-text">|</text>
  <text x="946" y="1012" class="guardrail-text">skeptic review before final report</text>
  <text x="1228" y="1012" class="guardrail-text">|</text>
  <text x="1256" y="1012" class="guardrail-text">receipts and verification for major claims</text>

  <text x="88" y="1040" class="small" fill="#d6e2ee">Core repo anchors: backend/main.py, backend/api/narratives.py, backend/services/research_loop_runner.py, backend/services/investigation_repository.py, frontend/src/pages/InvestigationPage.tsx</text>
</svg>
